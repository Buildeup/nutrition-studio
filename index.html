<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nutrition Studio</title>
  <style>
    :root { --bg:#f7f4ee; --card:#fffdf8; --ink:#28231f; --muted:#786f66; --line:#e5ded3; --accent:#9b5f2f; --accent2:#2f6f55; }
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--ink)}
    header{padding:28px 24px;border-bottom:1px solid var(--line);background:#fffaf1} h1{margin:0;font-size:28px} .sub{margin-top:8px;color:var(--muted)}
    main{max-width:1200px;margin:0 auto;padding:24px;display:grid;gap:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 24px rgba(30,20,10,.04)}
    h2{font-size:18px;margin:0 0 14px}.row{display:grid;grid-template-columns:160px 1fr;gap:10px;align-items:center;margin:9px 0}label{font-weight:700;font-size:14px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:white;font-size:14px}textarea{min-height:90px}
    button{border:0;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;background:var(--accent);color:white}button.secondary{background:#efe7dc;color:var(--ink)}button.green{background:var(--accent2)}button.danger{background:#b54b43}.buttons{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    button{transition:background .15s ease,color .15s ease,box-shadow .15s ease}
    .preset-tab.active{background:var(--accent);color:#fff;box-shadow:0 0 0 2px rgba(155,95,47,.25)}
    table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:middle}th{color:var(--muted);font-size:12px} .small{font-size:12px;color:var(--muted)} .pill{display:inline-block;padding:4px 8px;border-radius:99px;background:#efe7dc;font-size:12px;color:#5f5147}.result{white-space:pre-wrap;background:white;border:1px solid var(--line);border-radius:12px;padding:14px;line-height:1.55}.full{grid-column:1/-1}.right{text-align:right}.warn{background:#fff8e5;border:1px solid #edd9a5;border-radius:12px;padding:12px;color:#614b16}.ok{background:#edf8f2;border:1px solid #bfe1cf;color:#214d39;border-radius:12px;padding:12px}
    th{white-space:nowrap}
    table button{white-space:nowrap}
    table input[type=number]{text-align:right}
    td.num{text-align:right;white-space:nowrap}
    #bomTable td,#bomTable th,#apiResults td,#apiResults th{padding:7px 8px}
    #bomTable tr:hover,#apiResults tr:hover{background:#faf6ef}
    #apiResults{overflow:auto}
    .btn-sm{padding:7px 11px;font-size:13px}
    button.danger{background:#fff;color:#b54b43;border:1px solid #ecc7c3}
    button.danger:hover{background:#b54b43;color:#fff}
    .cell-food{min-width:220px;white-space:normal}
    .cell-food .food-base{font-weight:700}
    .cell-food .food-sub{font-size:11px;color:var(--muted);margin-top:2px}
    #bomTable td.src{min-width:230px}
    #bomTable td.num{min-width:64px}
    #bomTable td.num input{min-width:52px}
    #bomTable{min-width:860px}
    #bomTable td.src input{text-overflow:ellipsis}
    .saved-item{display:inline-flex;align-items:center;gap:2px}
    .saved-del{background:#efe7dc;color:#9b5f2f;border:0;border-radius:8px;padding:8px 10px;font-weight:800;line-height:1;cursor:pointer}
    .saved-del:hover{background:#e3d8c8}
    #resultSummary{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
    .rs-card{flex:1 1 120px;min-width:108px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
    .rs-label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .rs-val{font-size:21px;font-weight:800;color:var(--ink);line-height:1.1}
    .rs-unit{font-size:12px;font-weight:600;color:var(--muted)}
    .rs-pct{font-size:11px;color:var(--accent);margin-top:5px;font-weight:600}
    .rs-empty{color:var(--muted);font-size:13px;padding:6px 0}
    .name-cell{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .name-cell input{flex:1;width:auto;min-width:84px}
    #bomTable td:first-child{min-width:188px}
    .chip-empty{display:inline-flex;align-items:center;background:var(--line);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:99px;white-space:nowrap}
    .btn-attn{box-shadow:0 0 0 2px rgba(155,95,47,.28)}
    .src-badge{display:inline-block;margin-top:4px;font-size:11px;padding:2px 8px;border-radius:99px;white-space:nowrap}
    .src-api{background:#edf8f2;color:#1d7a55}
    .src-raw{background:#eef2fb;color:#3a5a9b}
    .src-manual{background:#efe7dc;color:#7a6a52}
    .src-unverified{background:#fff8e5;color:#8a6d1a}
    #libPanel{border:1px solid var(--line);border-radius:12px;padding:12px;background:#faf6ef}
    .lib-list{display:flex;flex-wrap:wrap;gap:8px}
    .lib-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 10px;flex:1 1 240px;min-width:200px}
    .lib-info{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .lib-actions{display:flex;gap:4px;align-items:center}
    .lookup-row td{background:#faf6ef;padding:10px}
    .lk-head{margin-bottom:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .lk-list{display:flex;flex-direction:column;gap:6px}
    .lk-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 10px}
    .lk-food{min-width:150px}
    .lk-nums{flex:1;color:var(--muted)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.lk-item{flex-wrap:wrap}}
  </style>
</head>
<body>
<header>
  <h1>Nutrition Studio</h1>
  <div class="sub">원재료 배합비 기반 영양표시 계산기 · API 키는 서버 .env에만 저장됩니다.</div>
</header>
<main>
  <div class="grid">
    <section class="card">
      <h2>1. 제품 정보</h2>
      <div class="row"><label>제품명</label><input id="productName" value="수제 딸기청"></div>
      <div class="row"><label>총 내용량</label><input id="totalAmount" value="1.2kg"></div>
      <div class="row"><label>식품유형</label><input id="foodType" value="액상차"></div>
      <div class="row"><label>완제품 수율</label><input id="yieldRate" type="number" value="100" min="1" step="0.1"></div>
      <div class="small">수율 100% = 표시 배합비를 완제품 100g 기준으로 계산. 수율 95%면 영양성분이 농축되어 보정됩니다.</div>
      <div class="buttons">
        <button class="secondary preset-tab" data-preset="strawberry" onclick="loadPreset('strawberry')">딸기청</button>
        <button class="secondary preset-tab" data-preset="lemon" onclick="loadPreset('lemon')">레몬청</button>
        <button class="secondary preset-tab" data-preset="orange" onclick="loadPreset('orange')">오렌지청</button>
        <button class="secondary preset-tab" data-preset="grapefruit" onclick="loadPreset('grapefruit')">자몽청</button>
        <button class="secondary preset-tab" data-preset="new" onclick="newProduct()">새 제품</button>
        <button class="green" onclick="saveProduct()">제품 저장</button>
      </div>
      <div id="savedWrap" style="margin-top:8px"></div>
    </section>

    <section class="card">
      <h2>2. API 원료 조회</h2>
      <div class="row"><label>검색어</label><input id="apiQuery" placeholder="예: 딸기, 레몬, 오렌지, 자몽"></div>
      <div class="buttons"><button class="green" onclick="searchIngredient()">조회</button><button class="secondary" onclick="checkServer()">서버 확인</button></div>
      <div id="apiStatus" class="small" style="margin-top:10px"></div>
      <div id="apiResults" style="margin-top:12px"></div>
    </section>
  </div>

  <section class="card full">
    <h2>3. 원재료(BOM)</h2>
    <div class="small" style="margin:0 0 10px">원료와 배합비%를 넣으면(합계 100%) 아래 결과가 자동 산출됩니다.</div>
    <div class="buttons"><button onclick="addBomRow()">원료 추가</button><button class="green" onclick="calculate()">계산하기</button><button class="secondary" style="margin-left:auto" onclick="saveToLibrary()">라이브러리에 저장</button><button class="secondary" onclick="toggleLibrary()">라이브러리에서 추가</button></div>
    <div id="libPanel" style="display:none;margin-top:10px"></div>
    <div style="overflow:auto;margin-top:12px"><table id="bomTable"></table></div>
    <div id="bomSum" style="margin-top:10px"></div>
  </section>

  <section class="card full">
    <h2>4. 결과</h2>
    <div class="buttons"><button onclick="copyText('labelText')">라벨 문구 복사</button><button onclick="copyText('reportText')">근거서 복사</button><button class="secondary" onclick="window.print()">인쇄/PDF</button></div>
    <h3>100g당 영양성분</h3>
    <div id="resultSummary"></div>
    <div id="emptyNutriHint" class="small" style="margin-bottom:12px;display:none"></div>
    <h3>라벨용 한 줄 문구</h3>
    <div id="labelText" class="result"></div>
    <h3>내부 산출 근거서</h3>
    <div id="reportText" class="result"></div>
  </section>
</main>
<script>
const DV = { carb:324, sugar:100, fat:54, satFat:15, cholesterol:300, protein:55, sodium:2000 };
let bom = [];
let lookup = { row:null, loading:false, error:'', rows:[] };
let libOpen = false;

const presets = {
  strawberry: { name:'수제 딸기청', amount:'1.2kg', type:'액상차', recipe:[['냉동딸기',60],['자일로스설탕',38.95],['비타민C/소브산칼륨',1.05]] },
  lemon: { name:'수제 레몬청', amount:'1kg', type:'액상차', recipe:[['레몬',50],['자일로스설탕',49.35],['비타민C/소브산칼륨',0.65]] },
  orange: { name:'수제 오렌지청', amount:'1kg', type:'액상차', recipe:[['오렌지',50],['자일로스설탕',49.35],['비타민C/소브산칼륨',0.65]] },
  grapefruit: { name:'수제 자몽청', amount:'1kg', type:'액상차', recipe:[['자몽',50],['자일로스설탕',49.35],['비타민C/소브산칼륨',0.65]] }
};

// 직접관리 원료(공공DB 미등록)만 시드 영양값 유지 — 과일류는 하드코딩 제거, 로드 시 API로 채움.
const SEED = {
  '자일로스설탕': {kcal:400, carb:100, sugar:100, fat:0, transFat:0, satFat:0, cholesterol:0, protein:0, sodium:0, source:'원료사 규격서/성분표 필요'},
  '비타민C/소브산칼륨': {kcal:0, carb:0, sugar:0, fat:0, transFat:0, satFat:0, cholesterol:0, protein:0, sodium:0, source:'미량 원료. 원료사 규격서 보관'}
};
// 과일 원물 표준값(식약처 식품영양성분DB, 100g당) — 로드 시 정확값 즉시 채움. 가공품 자동조회 안 함.
const RAW_REF = {
  '냉동딸기': {kcal:32, carb:7.7, sugar:4.9, fat:0.3, transFat:0, satFat:0, cholesterol:0, protein:0.7, sodium:1, source:'식품영양성분DB (원물 기준)'},
  '레몬': {kcal:29, carb:9.3, sugar:2.5, fat:0.3, transFat:0, satFat:0, cholesterol:0, protein:1.1, sodium:2, source:'식품영양성분DB (원물 기준)'},
  '오렌지': {kcal:47, carb:11.8, sugar:9.4, fat:0.1, transFat:0, satFat:0, cholesterol:0, protein:0.9, sodium:0, source:'식품영양성분DB (원물 기준)'},
  '자몽': {kcal:32, carb:7.92, sugar:4.20, fat:0.05, transFat:0, satFat:0.01, cholesterol:0, protein:0.84, sodium:1, foodCd:'R108-084000001-0000', source:'식품영양성분DB·농진청 (원물 기준)'},
  '생강': {kcal:42, carb:9.82, sugar:0.45, fat:0.15, transFat:0, satFat:0.06, cholesterol:0, protein:0.97, sodium:4, foodCd:'R106-101002501-0000', source:'식품영양성분DB·농진청 (원물 기준)'},
  '포도': {kcal:60, carb:15.73, sugar:13.74, fat:0.27, transFat:0, satFat:0.02, cholesterol:0, protein:0.40, sodium:1, foodCd:'R108-098010001-0000', source:'식품영양성분DB·농진청 (원물 기준 · 거봉)'}
};
const RAW_ALIAS = { '생자몽':'자몽', '냉동자몽':'자몽' };
function rawRefFor(name){ const n=String(name||'').trim(); return RAW_REF[n] || RAW_REF[RAW_ALIAS[n]] || null; }
function applyRawRefByName(i){
  const row=bom[i]; if(!row) return;
  const ref=rawRefFor(row.name);
  if(ref && rowEmptyNutri(row)){
    Object.assign(row, { kcal:ref.kcal, carb:ref.carb, sugar:ref.sugar, fat:ref.fat, transFat:ref.transFat, satFat:ref.satFat, cholesterol:ref.cholesterol, protein:ref.protein, sodium:ref.sodium, source:ref.source||'', foodCd:ref.foodCd||'', lookedUpAt:'' });
    renderBom();
  }
  calculate();
}
function emptyNutri(){ return {kcal:0,carb:0,sugar:0,fat:0,transFat:0,satFat:0,cholesterol:0,protein:0,sodium:0}; }

function round(n, d=0){ const p=Math.pow(10,d); return Math.round((Number(n)||0)*p)/p; }
function pct(v, dv){ return Math.round(((Number(v)||0)/dv)*100); }
function fmtG(v){ return `${Math.round(Number(v)||0)}g`; }
function fmtMg(v){ return `${Math.round(Number(v)||0)}mg`; }
function escapeHtml(s){return String(s).replace(/[&<>"]/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));}
function todayStr(){ const d=new Date(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${d.getFullYear()}-${m}-${day}`; }
function getFoodCd(x){ return (x && x.raw && x.raw.foodCd) || (x && x.foodCd) || ''; }
function foodNameCell(x){
  const base = x.baseName || String(x.foodName||'').replace(/\s*\([^)]*\)\s*$/,'').trim() || String(x.foodName||'');
  const parts = [x.foodType, x.maker, x.foodSize, x.origin].filter(Boolean);
  let sub = parts.join(' · ');
  if(!sub){ const m=String(x.foodName||'').match(/\(([^)]*)\)\s*$/); if(m) sub=m[1]; }
  return `<div class="food-base">${escapeHtml(base)}</div>`+(sub?`<div class="food-sub">${escapeHtml(sub)}</div>`:'');
}
function cleanLabel(v){ const t=String(v==null?'':v).trim(); if(!t) return ''; if(/^(해당\s*없음|없음|미상|미정|n\/?a|null)$/i.test(t)) return ''; return t; }
function buildApiSource(x, meta){
  const food = cleanLabel(x.foodName) || cleanLabel(x.baseName) || '';
  const maker = cleanLabel(x.maker);
  const parts = [];
  String(x.source||'').split('/').map(s=>cleanLabel(s)).filter(Boolean).forEach(p=>{ if(p!==maker && !parts.includes(p)) parts.push(p); });
  if(maker && !(food && food.includes(maker)) && !parts.includes(maker)) parts.push(maker);
  const origin = cleanLabel(x.origin);
  if(origin && !(food && food.includes(origin))) parts.push('원산지 '+origin);
  if(!parts.some(p=>/Open\s*API|공공데이터/i.test(p))) parts.push('공공데이터포털 Open API');
  const right = parts.join(' / ');
  let base = food ? (right ? `${food} — ${right}` : food) : (right || '공공데이터포털 식품영양정보 Open API');
  meta = meta || {};
  const tag=[];
  const cd=cleanLabel(meta.foodCd); if(cd) tag.push('코드 '+cd);
  if(meta.lookedUpAt) tag.push('조회 '+meta.lookedUpAt);
  if(tag.length) base += ` [${tag.join(' · ')}]`;
  return base;
}
function rowEmptyNutri(it){ return ['kcal','carb','sugar','fat','protein','sodium','satFat','transFat','cholesterol'].every(k=>!(+it[k])); }
function needsLookup(it){ return (+it.percent>0) && rowEmptyNutri(it); }
function sourceStatus(it){
  const s=String(it.source||'').trim();
  if(/Open\s*API|공공데이터/i.test(s)) return 'api';
  if(/원물\s*기준/.test(s)) return 'raw';
  if(s) return 'manual';
  return rowEmptyNutri(it) ? '' : 'unverified';
}
function sourceBadge(it){
  const st=sourceStatus(it);
  if(st==='api') return `<span class="src-badge src-api">✅ API 확인됨</span>`;
  if(st==='raw') return `<span class="src-badge src-raw">📚 원물 기준</span>`;
  if(st==='manual') return `<span class="src-badge src-manual">✏️ 직접입력</span>`;
  if(st==='unverified') return `<span class="src-badge src-unverified">⚠ 확인 필요</span>`;
  return '';
}
function renderEmptyNutriHint(){
  const el=document.getElementById('emptyNutriHint'); if(!el) return;
  const names=bom.filter(needsLookup).map(b=>(b.name&&b.name.trim())||'(이름 없음)');
  if(!names.length){ el.style.display='none'; el.textContent=''; return; }
  el.style.display='';
  el.textContent=`영양값이 비어 결과에 반영되지 않은 원료: ${names.join(', ')} (행의 [조회]로 값을 채우세요)`;
}
async function lookupRow(i){
  if(!bom[i]) return;
  const name=String(bom[i].name||'').trim();
  if(!name){ alert('원료명을 입력한 뒤 조회하세요.'); return; }
  lookup={ row:bom[i], loading:true, error:'', rows:[] }; renderBom();
  try{
    const r=await fetch(`/api/search-ingredient?q=${encodeURIComponent(name)}`);
    const j=await r.json(); if(!r.ok) throw new Error(j.error||j.message||'조회 실패');
    lookup={ row:bom[i], loading:false, error:'', rows:(j.rows||[]).slice(0,10) };
  }catch(e){ lookup={ row:bom[i], loading:false, error:e.message, rows:[] }; }
  renderBom();
}
function fillBomRow(i, x){
  if(!bom[i]) return;
  const foodCd=getFoodCd(x); const lookedUpAt=todayStr();
  Object.assign(bom[i], { kcal:x.kcal, carb:x.carbohydrate, sugar:x.sugars, fat:x.fat, satFat:x.saturatedFat, transFat:x.transFat, cholesterol:x.cholesterol, protein:x.protein, sodium:x.sodium, foodCd, lookedUpAt, source:buildApiSource(x, {foodCd, lookedUpAt}) });
  lookup={ row:null, loading:false, error:'', rows:[] };
  renderBom(); calculate();
}
function closeLookup(){ lookup={ row:null, loading:false, error:'', rows:[] }; renderBom(); }
function lookupRowHtml(i){
  let inner;
  const nm = escapeHtml(bom[i]?bom[i].name:'');
  if(lookup.loading){ inner=`<span class="small">‘${nm}’ 조회 중…</span>`; }
  else if(lookup.error){ inner=`<span class="small">조회 실패: ${escapeHtml(lookup.error)}</span> <button class="btn-sm secondary" onclick="closeLookup()">닫기</button>`; }
  else if(!lookup.rows.length){ inner=`<span class="small">‘${nm}’ 검색 결과가 없습니다.</span> <button class="btn-sm secondary" onclick="closeLookup()">닫기</button>`; }
  else {
    const list=lookup.rows.map(x=>{ const slim=Object.assign({},x); slim.foodCd=(x.raw&&x.raw.foodCd)||x.foodCd||''; delete slim.raw; return `<div class="lk-item"><div class="lk-food">${foodNameCell(x)}</div><div class="lk-nums small">${round(x.kcal,1)}kcal · 탄${round(x.carbohydrate,1)} · 당${round(x.sugars,1)} · 지${round(x.fat,1)} · 단${round(x.protein,1)} · 나${round(x.sodium,1)}mg</div><button class="btn-sm" onclick='fillBomRow(${i}, ${JSON.stringify(slim).replace(/'/g,"&#39;")})'>선택</button></div>`; }).join('');
    inner=`<div class="lk-head"><span class="small">‘${nm}’ 검색 결과 ${lookup.rows.length}건 — 선택하면 이 행에 영양값·출처가 채워집니다</span> <button class="btn-sm secondary" onclick="closeLookup()">닫기</button></div><div class="lk-list">${list}</div>`;
  }
  return `<tr class="lookup-row"><td colspan="10">${inner}</td></tr>`;
}

function renderBom(){
  const rows = bom.map((it,i)=>`<tr>
    <td><div class="name-cell"><input value="${escapeHtml(it.name)}" onchange="bom[${i}].name=this.value;applyRawRefByName(${i})"><button class="btn-sm ${needsLookup(it)?'btn-attn':'secondary'}" onclick="lookupRow(${i})">조회</button>${needsLookup(it)?'<span class="chip-empty">값 없음 · 조회 필요</span>':''}</div></td>
    <td class="num"><input type="number" value="${it.percent}" step="0.01" onchange="bom[${i}].percent=+this.value;updateBomSum();calculate()"></td>
    <td class="num"><input type="number" value="${round(it.kcal,2)}" onchange="bom[${i}].kcal=+this.value;calculate()"></td>
    <td class="num"><input type="number" value="${round(it.carb,2)}" onchange="bom[${i}].carb=+this.value;calculate()"></td>
    <td class="num"><input type="number" value="${round(it.sugar,2)}" onchange="bom[${i}].sugar=+this.value;calculate()"></td>
    <td class="num"><input type="number" value="${round(it.fat,2)}" onchange="bom[${i}].fat=+this.value;calculate()"></td>
    <td class="num"><input type="number" value="${round(it.protein,2)}" onchange="bom[${i}].protein=+this.value;calculate()"></td>
    <td class="num"><input type="number" value="${round(it.sodium,2)}" onchange="bom[${i}].sodium=+this.value;calculate()"></td>
    <td class="src"><input title="${escapeHtml(it.source||'')}" value="${escapeHtml(it.source||'')}" onchange="bom[${i}].source=this.value">${sourceBadge(it)}</td>
    <td><button class="danger btn-sm" onclick="bom.splice(${i},1);renderBom();calculate()">삭제</button></td>
  </tr>`+(lookup.row===it?lookupRowHtml(i):'')).join('');
  document.getElementById('bomTable').innerHTML = `<tr><th>원료명</th><th>배합비%</th><th>kcal</th><th>탄수화물(g)</th><th>당류(g)</th><th>지방(g)</th><th>단백질(g)</th><th>나트륨(mg)</th><th>출처</th><th></th></tr>${rows}`;
  updateBomSum();
}
function updateBomSum(){
  const el=document.getElementById('bomSum'); if(!el) return;
  if(!bom.length){ el.className='small'; el.textContent=''; return; }
  const s=bom.reduce((a,b)=>a+(+b.percent||0),0); const ok=Math.abs(s-100)<=0.5;
  el.className = ok ? 'ok' : 'warn';
  el.innerHTML = ok ? `배합비 합계: <b>${round(s,2)}%</b>` : `⚠ 배합비 합계가 100%가 아닙니다 (현재 ${round(s,2)}%)`;
}
function renderAll(){ renderBom(); }

checkServer();
function setActiveTab(key){
  document.querySelectorAll('.preset-tab').forEach(b=>b.classList.toggle('active', b.dataset.preset===key));
}
function loadPreset(key){ const p=presets[key]; document.getElementById('productName').value=p.name; document.getElementById('totalAmount').value=p.amount; document.getElementById('foodType').value=p.type; bom=p.recipe.map(([name,percent])=>{ const ref=RAW_REF[name]||SEED[name]||{}; return {name, percent, ...emptyNutri(), ...ref, source:(ref.source||'')}; }); renderBom(); calculate(); setActiveTab(key); }
function newProduct(){ document.getElementById('productName').value=''; document.getElementById('totalAmount').value='1kg'; document.getElementById('foodType').value='액상차'; bom=[]; renderBom(); document.getElementById('labelText').textContent=''; document.getElementById('reportText').textContent=''; renderResultSummary(); setActiveTab('new'); }
function addBomRow(){ bom.push({name:'새 원료', percent:0, ...emptyNutri(), source:'직접입력'}); renderBom(); calculate(); }

async function checkServer(){
  const el=document.getElementById('apiStatus'); el.textContent='확인 중...';
  try{
    const r=await fetch('/api/health'); const j=await r.json();
    const keyOk=j.hasServiceKey;
    const endpointOk=j.hasEndpoint;
    const pills=[
      '<span class="pill">서버 정상</span>',
      keyOk ? '<span class="pill">일반 인증키 있음</span>' : '<span class="pill">일반 인증키 없음 (.env의 DATA_GO_KR_SERVICE_KEY)</span>',
      endpointOk ? '<span class="pill">End Point (.env)</span>' : '<span class="pill">End Point 기본값 사용</span>',
    ];
    el.innerHTML=pills.join(' ');
  }
  catch(e){ el.textContent='서버 연결 실패. http://localhost:5174 로 접속했는지 확인하세요.'; }
}

async function searchIngredient(){
  const q=document.getElementById('apiQuery').value.trim();
  const status=document.getElementById('apiStatus'); const box=document.getElementById('apiResults');
  if(!q){ status.textContent='검색어를 입력하세요.'; return; }
  status.textContent='조회 중...'; box.innerHTML='';
  try{
    const r=await fetch(`/api/search-ingredient?q=${encodeURIComponent(q)}`);
    const j=await r.json(); if(!r.ok) throw new Error(j.error || j.message || '조회 실패');
    status.textContent=`조회 결과 ${j.count}건`;
    box.innerHTML = `<div class="small" style="margin-bottom:6px">${j.count}건</div>` + `<table><tr><th>식품명</th><th>kcal</th><th>탄수화물(g)</th><th>당류(g)</th><th>지방(g)</th><th>단백질(g)</th><th>나트륨(mg)</th><th></th></tr>` + j.rows.slice(0,10).map((x,idx)=>`<tr><td class="cell-food">${foodNameCell(x)}</td><td class="num">${round(x.kcal,1)}</td><td class="num">${round(x.carbohydrate,1)}</td><td class="num">${round(x.sugars,1)}</td><td class="num">${round(x.fat,1)}</td><td class="num">${round(x.protein,1)}</td><td class="num">${round(x.sodium,1)}</td><td><button class="btn-sm" onclick='addApiIngredient(${JSON.stringify(x).replace(/'/g,"&#39;")})'>등록</button></td></tr>`).join('') + `</table>`;
  }catch(e){ status.textContent='조회 실패: '+e.message; }
}
function addApiIngredient(x){
  const foodCd=getFoodCd(x); const lookedUpAt=todayStr();
  bom.push({name:x.foodName, percent:0, kcal:x.kcal, carb:x.carbohydrate, sugar:x.sugars, fat:x.fat, transFat:x.transFat, satFat:x.saturatedFat, cholesterol:x.cholesterol, protein:x.protein, sodium:x.sodium, foodCd, lookedUpAt, source:buildApiSource(x, {foodCd, lookedUpAt})}); renderBom(); calculate();
}

function calculate(){
  const y=(+document.getElementById('yieldRate').value||100)/100; const factor = y>0 ? 1/y : 1;
  let total={kcal:0,carb:0,sugar:0,fat:0,transFat:0,satFat:0,cholesterol:0,protein:0,sodium:0};
  const lines=[];
  for(const r of bom){ const w=(+r.percent||0); const f=w/100*factor; ['kcal','carb','sugar','fat','transFat','satFat','cholesterol','protein','sodium'].forEach(k=> total[k]+= (+r[k]||0)*f); lines.push({name:r.name, percent:w, source:r.source}); }
  const kcal=Math.round(total.kcal); const carb=Math.round(total.carb); const sugar=Math.round(total.sugar); const fat=Math.round(total.fat); const protein=Math.round(total.protein); const sodium=Math.round(total.sodium);
  const satFat=Math.round(total.satFat||0); const transFat=Math.round(total.transFat||0); const cholesterol=Math.round(total.cholesterol||0);
  const amount=document.getElementById('totalAmount').value; const pname=document.getElementById('productName').value;
  const label=`영양정보 | 총 내용량 ${amount} / 100g당 ${kcal}kcal / 나트륨 ${sodium}mg ${pct(sodium,DV.sodium)}% / 탄수화물 ${carb}g ${pct(carb,DV.carb)}% / 당류 ${sugar}g ${pct(sugar,DV.sugar)}% / 지방 ${fat}g ${pct(fat,DV.fat)}% / 트랜스지방 ${transFat}g / 포화지방 ${satFat}g ${pct(satFat,DV.satFat)}% / 콜레스테롤 ${cholesterol}mg ${pct(cholesterol,DV.cholesterol)}% / 단백질 ${protein}g ${pct(protein,DV.protein)}% / 1일 영양성분 기준치에 대한 비율(%)은 2,000kcal 기준이므로 개인의 필요 열량에 따라 다를 수 있습니다.`;
  const report=`영양성분 산출 근거서\n\n제품명: ${pname}\n총 내용량: ${amount}\n식품유형: ${document.getElementById('foodType').value}\n기준량: 100g당\n제조수율: ${document.getElementById('yieldRate').value}%\n수율 보정계수: ${round(factor,4)}\n\n[배합비 기준 계산표]\n${lines.map(x=>`- ${x.name}: ${x.percent}%`).join('\n')}\n\n[원료별 영양성분 출처]\n${lines.map(x=>`- ${x.name}: ${x.source}`).join('\n')}\n\n[최종 표시값]\n${label}\n\n[검토 의견]\n본 산출값은 제조원 제공 배합비, 원료별 영양성분 자료, 제조수율을 기준으로 계산한 내부 표시 검토용 값입니다. 최종 인쇄 전 제조원 확인 및 필요 시 시험성적서 확보를 권장합니다.`;
  document.getElementById('labelText').textContent=label; document.getElementById('reportText').textContent=report;
  renderResultSummary({kcal,carb,sugar,fat,protein,sodium,satFat,transFat,cholesterol});
}
function renderResultSummary(v){
  v=v||{};
  renderEmptyNutriHint();
  const el=document.getElementById('resultSummary'); if(!el) return;
  const sum=bom.reduce((a,b)=>a+(+b.percent||0),0);
  if(!bom.length || sum===0){ el.innerHTML=`<div class="rs-empty">원료와 배합비%를 입력하세요.</div>`; return; }
  const cards=[
    ['열량', `${v.kcal}`, 'kcal', null],
    ['탄수화물', fmtG(v.carb), '', pct(v.carb,DV.carb)],
    ['당류', fmtG(v.sugar), '', pct(v.sugar,DV.sugar)],
    ['지방', fmtG(v.fat), '', pct(v.fat,DV.fat)],
    ['단백질', fmtG(v.protein), '', pct(v.protein,DV.protein)],
    ['나트륨', fmtMg(v.sodium), '', pct(v.sodium,DV.sodium)],
    ['포화지방', fmtG(v.satFat), '', pct(v.satFat,DV.satFat)],
    ['트랜스지방', fmtG(v.transFat), '', null],
    ['콜레스테롤', fmtMg(v.cholesterol), '', pct(v.cholesterol,DV.cholesterol)]
  ];
  el.innerHTML = cards.map(([label,val,unit,p])=>`<div class="rs-card"><div class="rs-label">${label}</div><div class="rs-val">${val}${unit?` <span class="rs-unit">${unit}</span>`:''}</div>${p!=null?`<div class="rs-pct">1일기준 ${p}%</div>`:''}</div>`).join('');
}
function copyText(id){ navigator.clipboard.writeText(document.getElementById(id).textContent); alert('복사했습니다.'); }

// ── [A] 제품 저장/불러오기 "내 제품" ──
function getSavedProducts(){ try{ return JSON.parse(localStorage.getItem('savedProducts')||'{}')||{}; }catch(e){ return {}; } }
function saveProduct(){
  const name=document.getElementById('productName').value.trim();
  if(!name){ alert('제품명을 입력하면 저장할 수 있습니다.'); return; }
  const data=getSavedProducts();
  data[name]={ name, amount:document.getElementById('totalAmount').value, foodType:document.getElementById('foodType').value, yield:(+document.getElementById('yieldRate').value||100), bom:bom.map(r=>({...r})) };
  localStorage.setItem('savedProducts', JSON.stringify(data));
  renderSavedProducts(); setActiveTab('saved:'+name);
  alert(`'${name}' 제품을 저장했습니다.`);
}
function renderSavedProducts(){
  const data=getSavedProducts(); const names=Object.keys(data); const wrap=document.getElementById('savedWrap');
  if(!wrap) return;
  if(!names.length){ wrap.innerHTML=''; return; }
  const items=names.map(n=>`<span class="saved-item"><button class="secondary preset-tab" data-preset="saved:${escapeHtml(n)}" onclick='loadSavedProduct(${JSON.stringify(n).replace(/'/g,"&#39;")})'>${escapeHtml(n)}</button><button class="saved-del" title="삭제" onclick='deleteSavedProduct(${JSON.stringify(n).replace(/'/g,"&#39;")})'>×</button></span>`).join('');
  wrap.innerHTML=`<div class="small" style="margin-bottom:6px">내 제품</div><div class="buttons" style="margin-top:0">${items}</div>`;
}
function loadSavedProduct(name){
  const p=getSavedProducts()[name]; if(!p) return;
  document.getElementById('productName').value=p.name||name;
  document.getElementById('totalAmount').value=p.amount||'';
  document.getElementById('foodType').value=p.foodType||'';
  document.getElementById('yieldRate').value=(p.yield!=null?p.yield:100);
  bom=(p.bom || (p.recipe||[]).map(r=>{ const s=RAW_REF[r.name]||SEED[r.name]||{}; return {name:r.name, percent:r.percent, ...emptyNutri(), ...s, source:(s.source||'')}; })).map(r=>({...r}));
  renderBom(); calculate(); setActiveTab('saved:'+name);
}
function deleteSavedProduct(name){
  if(!confirm(`'${name}' 저장 제품을 삭제할까요?`)) return;
  const data=getSavedProducts(); delete data[name];
  localStorage.setItem('savedProducts', JSON.stringify(data));
  renderSavedProducts();
}

// ── 자주 쓰는 원료 라이브러리 ──
function getLibrary(){ try{ return JSON.parse(localStorage.getItem('ingredientLibrary')||'[]')||[]; }catch(e){ return []; } }
function setLibrary(arr){ localStorage.setItem('ingredientLibrary', JSON.stringify(arr)); }
function libItemFrom(r){ return { name:r.name, kcal:+r.kcal||0, carb:+r.carb||0, sugar:+r.sugar||0, fat:+r.fat||0, transFat:+r.transFat||0, satFat:+r.satFat||0, cholesterol:+r.cholesterol||0, protein:+r.protein||0, sodium:+r.sodium||0, source:r.source||'', foodCd:r.foodCd||'', lookedUpAt:r.lookedUpAt||'' }; }
function saveToLibrary(){
  const lib=getLibrary(); let n=0;
  bom.forEach(r=>{ if(rowEmptyNutri(r) || !String(r.name||'').trim()) return; const item=libItemFrom(r); const idx=lib.findIndex(x=>x.name===item.name); if(idx>=0) lib[idx]=item; else lib.push(item); n++; });
  setLibrary(lib); renderLibraryPanel();
  alert(n ? `라이브러리에 ${n}개 원료를 저장/갱신했습니다.` : '저장할 영양값이 있는 원료가 없습니다.');
}
function toggleLibrary(){ libOpen=!libOpen; renderLibraryPanel(); }
function renderLibraryPanel(){
  const el=document.getElementById('libPanel'); if(!el) return;
  if(!libOpen){ el.style.display='none'; el.innerHTML=''; return; }
  el.style.display='';
  const lib=getLibrary();
  if(!lib.length){ el.innerHTML=`<div class="small">저장된 원료가 없습니다. 영양값을 채운 뒤 [라이브러리에 저장]을 누르세요.</div>`; return; }
  const items=lib.map((it,i)=>`<div class="lib-item"><div class="lib-info"><b>${escapeHtml(it.name)}</b> <span class="small">${round(it.kcal,1)}kcal</span> ${sourceBadge(it)}</div><div class="lib-actions"><button class="btn-sm" onclick="addFromLibrary(${i})">추가</button><button class="saved-del" title="삭제" onclick="deleteFromLibrary(${i})">×</button></div></div>`).join('');
  el.innerHTML=`<div class="small" style="margin-bottom:6px">자주 쓰는 원료 (${lib.length})</div><div class="lib-list">${items}</div>`;
}
function addFromLibrary(i){
  const lib=getLibrary(); const it=lib[i]; if(!it) return;
  bom.push(Object.assign({percent:0}, libItemFrom(it)));
  renderBom(); calculate();
}
function deleteFromLibrary(i){
  const lib=getLibrary(); if(i<0||i>=lib.length) return;
  lib.splice(i,1); setLibrary(lib); renderLibraryPanel();
}

loadPreset('strawberry'); renderSavedProducts();
